daemon on;
worker_processes auto;
error_log /dev/stderr;
pid /tmp/nginx.pid;
include /usr/share/nginx/modules/*.conf;
events {
    worker_connections 1024;
}
http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    gzip on;
    gzip_disable "msie6";
    client_max_body_size 10m;
    large_client_header_buffers 4 10k;
    ssl_certificate /Kiwi/ssl/localhost.crt;
    ssl_certificate_key /Kiwi/ssl/localhost.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    map $request_uri $limit_key {
        default "";
        ~^/accounts/ $binary_remote_addr;
    }
    limit_req_zone $limit_key zone=ten-per-sec:10m rate=10r/s;
    limit_req_status 429;
    upstream kiwitcms {
        server unix:///tmp/kiwitcms.sock;
    }
    add_header Content-Security-Policy "script-src 'self' cdn.crowdin.com *.ethicalads.io plausible.io;";
    # Serve the app on BOTH 8080 (plain) and 8443 (ssl) —
    # no nginx-level redirect, since Railway's edge already terminates HTTPS for us.
    server {
        listen 8080;
        listen [::]:8080;
        listen 8443 ssl;
        listen [::]:8443 ssl;
        server_name _;
        location = /favicon.ico {
            alias /Kiwi/static/images/favicon.ico;
        }
        location = /robots.txt {
            alias /Kiwi/static/robots.txt;
        }
        location /uploads/ {
            types { }
            default_type text/plain;
            alias /Kiwi/uploads/;
        }
        location /static/ {
            alias /Kiwi/static/;
        }
        location / {
            uwsgi_param HTTP_X_FORWARDED_PROTO https;
            include /etc/nginx/uwsgi_params;
            # Tell Django whether the original request (as seen by Railway's edge)
            # was HTTPS, so SECURE_SSL_REDIRECT / SECURE_PROXY_SSL_HEADER don't
            # force a redirect loop when Railway forwards plain HTTP to us on 8080.
            uwsgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            uwsgi_pass kiwitcms;
            limit_req zone=ten-per-sec burst=20 nodelay;
        }
    }
}
